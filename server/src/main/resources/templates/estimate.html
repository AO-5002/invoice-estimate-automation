<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Estimate</title>
    <style>
        /* All CSS is inline here on purpose: openhtmltopdf renders this HTML string with no base
           URI, so there are no external stylesheets or images to resolve. */
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            font-size: 12px;
            line-height: 1.5;
        }

        .header {
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header .number {
            font-size: 13px;
            color: #555555;
            margin-top: 4px;
        }

        .meta {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .meta td {
            vertical-align: top;
            padding: 2px 0;
        }

        .meta .label {
            color: #777777;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 130px;
        }

        .status {
            display: inline-block;
            padding: 2px 10px;
            border: 1px solid #1a1a1a;
            border-radius: 3px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777777;
            margin: 20px 0 6px 0;
        }

        .description {
            white-space: pre-wrap;
        }

        table.items {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6px;
        }

        table.items th {
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777777;
            border-bottom: 1px solid #cccccc;
            padding: 6px 8px;
        }

        table.items th.amount,
        table.items td.amount {
            text-align: right;
        }

        table.items td {
            padding: 6px 8px;
            border-bottom: 1px solid #eeeeee;
        }

        .totals {
            width: 100%;
            margin-top: 12px;
        }

        .totals td {
            padding: 8px;
        }

        .totals .total-label {
            text-align: right;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .totals .total-value {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            width: 160px;
            border-top: 2px solid #1a1a1a;
        }

        .notes {
            margin-top: 28px;
            padding: 12px;
            background: #f6f6f6;
            font-size: 11px;
            color: #333333;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Estimate</h1>
        <div class="number" th:text="'Estimate #' + ${estimate.estimateNumber}">Estimate #</div>
    </div>

    <table class="meta">
        <tr>
            <td class="label">Prepared For</td>
            <td th:text="${estimate.client}">Client</td>
            <td class="label">Date</td>
            <td th:text="${estimate.estimateDate}">Estimate Date</td>
        </tr>
        <tr>
            <td class="label">Property</td>
            <td th:text="${estimate.property}">Property</td>
            <td class="label">Status</td>
            <td><span class="status" th:text="${estimate.approved}">Approved</span></td>
        </tr>
    </table>

    <div class="section-title">Project Description</div>
    <div class="description" th:text="${estimate.projectDescription}">Project description</div>

    <div class="section-title">Estimate</div>
    <table class="items">
        <thead>
            <tr>
                <th>Item</th>
                <th class="amount">Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td th:text="${estimate.projectDescription}">Project description</td>
                <td class="amount" th:text="${estimate.costToClient}">Cost To Client</td>
            </tr>
        </tbody>
    </table>

    <table class="totals">
        <tr>
            <td class="total-label">Estimated Total</td>
            <td class="total-value" th:text="${estimate.costToClient}">Cost To Client</td>
        </tr>
    </table>

    <div class="notes" th:if="${estimate.administrativeNotes != null and !estimate.administrativeNotes.isBlank()}"
         th:text="${estimate.administrativeNotes}">Administrative notes</div>
</body>
</html>
