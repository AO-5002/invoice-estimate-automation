spring.application.name=server

# ---------------------------------------------------------------------------
# Configuration contract.
#
# Real values come from environment variables at runtime via ${ENV_VAR:default}
# placeholders, so NO secrets live in this file. See server/.env.example for the
# full list. (A local server/.env is also picked up automatically and is
# gitignored — convenient for dev, never committed.)
# ---------------------------------------------------------------------------

# --- Google service-account credentials (provide EXACTLY ONE of the two) ---
# Path to the service-account JSON key file...
app.google.credentials-path=${GOOGLE_CREDENTIALS_PATH:}
# ...OR the key JSON supplied inline (for hosts that can't mount a file).
app.google.credentials-json=${GOOGLE_CREDENTIALS_JSON:}

# --- Google Sheets target ---
app.sheets.spreadsheet-id=${SHEETS_SPREADSHEET_ID:}
app.sheets.invoices-tab=${SHEETS_INVOICES_TAB:Invoice}
app.sheets.estimates-tab=${SHEETS_ESTIMATES_TAB:Estimate}

# --- In-memory cache TTL (seconds) ---
app.cache.ttl-seconds=${CACHE_TTL_SECONDS:60}

# --- CORS: browser origin allowed to call the API ---
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
